{% extends 'dummy_base.html' %}
{% block title  %}
PlacementCell
{% endblock %}
{% block content  %}
<h1 class = 'text-center'> PlacementCell Page  </h1>
<div class="container text-center bg-dark">
{% for d in placementcell %}
<div class="card text-center mx-3 my-3" style="width: 18rem;display:inline-block">
  <img src="{{d.student_image.url}}" class="card-img-top" alt="...">
  <div class="card-body">
    <h5 class="card-title">{{d.student_name}}</h5>
    <p class="card-text">{{d.dep_name}}</p>
  </div>
</div>
{% endfor %}
</div>
{% endblock %}
